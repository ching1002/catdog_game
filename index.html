<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#172033" />
    <title>貓狗大戰</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23ffcf7d'/%3E%3Ccircle cx='32' cy='34' r='19' fill='%23fffaf0'/%3E%3Cpath d='M18 22 24 8l8 14M46 22 40 8l-8 14' fill='%23ffcf7d' stroke='%23172033' stroke-width='4'/%3E%3Ccircle cx='25' cy='31' r='3' fill='%23172033'/%3E%3Ccircle cx='39' cy='31' r='3' fill='%23172033'/%3E%3Cpath d='M28 40q4 4 8 0' fill='none' stroke='%23172033' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="gameShell" class="game-shell">
      <canvas id="gameCanvas" aria-label="貓狗大戰遊戲畫面"></canvas>

      <section id="titleScreen" class="title-screen" aria-label="進入遊戲畫面">
        <div class="title-copy">
          <span class="title-kicker">手機橫向射擊冒險</span>
          <h1>貓狗大戰</h1>
          <p>貓咪守護隊即將迎戰狗狗軍團。</p>
        </div>
        <button id="enterGameButton" class="enter-game-button" type="button" aria-label="進入遊戲">
          <span>進入遊戲</span>
        </button>
      </section>

      <section id="introScreen" class="intro-screen hidden" aria-label="前導影片">
        <video id="introVideo" class="intro-video" src="./assets/video/intro.mp4" playsinline preload="auto"></video>
        <button id="skipIntroButton" class="skip-intro-button" type="button">SKIP</button>
      </section>

      <section class="hud hud-top" aria-label="遊戲狀態">
        <div class="brand">
          <strong>貓狗大戰</strong>
          <span id="saveState">已自動存檔</span>
        </div>
        <div class="stat-block">
          <span>分數</span>
          <strong id="scoreText">0</strong>
        </div>
        <div class="stat-block">
          <span>最高</span>
          <strong id="bestText">0</strong>
        </div>
        <div class="stat-block">
          <span>Wave</span>
          <strong id="waveText">1</strong>
        </div>
        <div class="stat-block">
          <span>Lv</span>
          <strong id="levelText">1</strong>
        </div>
        <button id="pauseButton" class="icon-button" type="button" aria-label="暫停">
          <span id="pauseIcon">II</span>
        </button>
        <button id="soundButton" class="icon-button" type="button" aria-label="音效">
          <span id="soundIcon">♪</span>
        </button>
      </section>

      <section class="hud hp-panel" aria-label="體力與經驗">
        <div class="meter-row">
          <span>HP</span>
          <div class="meter"><i id="hpFill"></i></div>
          <b id="hpText">100 / 100</b>
        </div>
        <div class="meter-row">
          <span>EXP</span>
          <div class="meter exp"><i id="xpFill"></i></div>
          <b id="xpText">0 / 100</b>
        </div>
        <div class="meter-row compact-row">
          <span>COMBO</span>
          <div class="meter combo"><i id="comboFill"></i></div>
          <b id="comboText">0 x1.0</b>
        </div>
      </section>

      <section class="touch-controls" aria-label="手機方向鍵">
        <button class="pad-btn pad-up" type="button" data-dir="up" aria-label="向上">▲</button>
        <button class="pad-btn pad-left" type="button" data-dir="left" aria-label="向左">◀</button>
        <button class="pad-btn pad-right" type="button" data-dir="right" aria-label="向右">▶</button>
        <button class="pad-btn pad-down" type="button" data-dir="down" aria-label="向下">▼</button>
      </section>

      <section class="action-controls" aria-label="技能與操作">
        <button id="skillButton" class="skill-button" type="button">毛球爆發</button>
      </section>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>

      <aside id="upgradePanel" class="overlay-panel hidden" aria-live="polite">
        <h1>升級了</h1>
        <p>選一項能力強化貓咪。</p>
        <div class="upgrade-grid">
          <button type="button" data-upgrade="maxHp">
            <strong>體力上限</strong>
            <span>最大 HP +20，並回復少量體力</span>
          </button>
          <button type="button" data-upgrade="damage">
            <strong>火力</strong>
            <span>光球傷害 +5</span>
          </button>
          <button type="button" data-upgrade="fireRate">
            <strong>射速</strong>
            <span>自動攻擊更快</span>
          </button>
          <button type="button" data-upgrade="defense">
            <strong>防禦</strong>
            <span>受到傷害降低</span>
          </button>
          <button type="button" data-upgrade="speed">
            <strong>機動力</strong>
            <span>移動速度提升</span>
          </button>
        </div>
      </aside>

      <aside id="pausePanel" class="overlay-panel pause-panel hidden">
        <h1>暫停</h1>
        <p>喘口氣，狗狗軍團也先原地等你。</p>
        <div class="panel-actions">
          <button id="resumeButton" class="primary-button" type="button">繼續</button>
          <button id="pauseRestartButton" class="secondary-button" type="button">重新開始</button>
        </div>
      </aside>

      <aside id="startPanel" class="overlay-panel start-panel hidden">
        <h1>貓狗大戰</h1>
        <p>操控貓咪閃避狗狗軍團，撐過一波波攻勢。手機請橫向遊玩，左下角方向鍵移動；電腦使用 WASD。連續擊破可累積 Combo 倍率。</p>
        <button id="startButton" class="primary-button" type="button">開始遊戲</button>
      </aside>

      <aside id="gameOverPanel" class="overlay-panel hidden">
        <h1>遊戲結束</h1>
        <p id="finalText">本局分數 0</p>
        <button id="restartButton" class="primary-button" type="button">重新開始</button>
      </aside>

      <div id="orientationHint" class="orientation-hint">
        <strong>請將手機轉為橫向</strong>
        <span>橫向畫面比較適合躲彈幕。</span>
      </div>
    </main>

    <script src="./game.js" defer></script>
  </body>
</html>
